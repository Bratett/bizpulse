services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bizpulse}
      POSTGRES_USER: ${POSTGRES_USER:-bizpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_READONLY_USER: ${POSTGRES_READONLY_USER:-bizpulse_readonly}
      POSTGRES_READONLY_PASSWORD: ${POSTGRES_READONLY_PASSWORD:-changeme_in_production}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bizpulse}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bizpulse}
      KC_DB_SCHEMA: keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-bizpulse}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/keycloak/bizpulse-realm.json:/opt/keycloak/data/import/bizpulse-realm.json
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  kong:
    image: kong:3.7
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: info
    volumes:
      - ./infra/kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - keycloak
      - transaction-svc
      - analytics-svc
      - compliance-svc
      - user-svc

  redpanda:
    image: redpandadata/redpanda:v24.1.1
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr 0.0.0.0:9092
      - --advertise-kafka-addr redpanda:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr redpanda:8082
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - rpdata:/var/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  transaction-svc:
    build:
      context: ./services/transaction-svc
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${TRANSACTION_SVC_PORT:-8080}:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-bizpulse}
      POSTGRES_USER: ${POSTGRES_USER:-bizpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-changeme_generate_a_real_secret}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics-svc:
    build:
      context: ./services/analytics-svc
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ANALYTICS_SVC_PORT:-8081}:8081"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-bizpulse}
      POSTGRES_READONLY_USER: ${POSTGRES_READONLY_USER:-bizpulse_readonly}
      POSTGRES_READONLY_PASSWORD: ${POSTGRES_READONLY_PASSWORD:-changeme_in_production}
      JWT_SECRET: ${JWT_SECRET:-changeme_generate_a_real_secret}
    depends_on:
      postgres:
        condition: service_healthy

  compliance-svc:
    build:
      context: ./services/compliance-svc
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${COMPLIANCE_SVC_PORT:-8082}:8082"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-bizpulse}
      POSTGRES_USER: ${POSTGRES_USER:-bizpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      JWT_SECRET: ${JWT_SECRET:-changeme_generate_a_real_secret}
      COMPLIANCE_SVC_PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy

  user-svc:
    build:
      context: ./services/user-svc
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${USER_SVC_PORT:-8083}:8083"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-bizpulse}
      POSTGRES_USER: ${POSTGRES_USER:-bizpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
      KEYCLOAK_REALM: bizpulse
      KEYCLOAK_CLIENT_ID: service-account
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-service-account-secret-change-in-production}
      USER_SVC_PORT: 8083
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://transaction-svc:8080
      NEXT_PUBLIC_ANALYTICS_URL: http://analytics-svc:8081
      NEXT_PUBLIC_COMPLIANCE_URL: http://compliance-svc:8082
    depends_on:
      - transaction-svc
      - analytics-svc
      - compliance-svc
      - user-svc

volumes:
  pgdata:
  rpdata:
